<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【請在這裡輸入你的測驗標題】迷因2選1</title>
    <style>
        :root {
            --dark-blue: #0A192F;
            --bright-blue: #172A45;
            --accent-blue: #30D5C8;
            --red: #E63946;
            --gold: #FFD700;
            --white: #F8F9FA;
        }

        body {
            background-color: var(--dark-blue);
            color: var(--white);
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            width: 100%;
            max-width: 600px;
            background: var(--bright-blue);
            border: 3px solid var(--gold);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        /* 偵探風格裝飾 */
        #game-container::before {
            content: "TOP SECRET / CASE FILE";
            position: absolute;
            top: -15px;
            left: 20px;
            background: var(--red);
            color: white;
            padding: 2px 10px;
            font-weight: bold;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--gold);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        h1 { margin: 10px 0; color: var(--gold); font-size: 1.8rem; }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            margin-bottom: 20px;
            color: var(--accent-blue);
        }

        .case-card {
            background: var(--white);
            color: #333;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 10px solid var(--red);
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: bold;
            line-height: 1.5;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 15px;
            font-size: 1.2rem;
            cursor: pointer;
            border: 2px solid var(--gold);
            background: transparent;
            color: var(--white);
            border-radius: 5px;
            transition: 0.3s;
            text-align: left;
        }

        .btn:hover:not(:disabled) {
            background: rgba(255, 215, 0, 0.1);
        }

        .btn:disabled { cursor: not-allowed; opacity: 0.8; }

        .correct { background-color: #2a9d8f !important; border-color: #2a9d8f; }
        .wrong { background-color: var(--red) !important; border-color: var(--red); }

        #feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
            line-height: 1.6;
        }

        .next-btn {
            display: none;
            width: 100%;
            margin-top: 20px;
            background: var(--gold);
            color: var(--dark-blue);
            font-weight: bold;
            text-align: center;
            border: none;
        }

        .result-screen {
            text-align: center;
            display: none;
        }

        .score-display { font-size: 3rem; color: var(--gold); margin: 20px 0; }
        .comment { font-size: 1.2rem; margin-bottom: 30px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="quiz-ui">
        <header>
            <h1 id="title-text">迷因偵探：2選1挑戰</h1>
        </header>
        
        <div class="status-bar">
            <span>案件進度: <span id="current-idx">1</span> / 67</span>
            <span>得分: <span id="score">0</span></span>
        </div>

        <div class="case-card">
            <div class="question-text" id="question">載入中...</div>
        </div>

        <div class="options-container" id="options">
            </div>

        <div id="feedback"></div>

        <button class="btn next-btn" id="next-btn" onclick="nextQuestion()">下一個案件 >></button>
    </div>

    <div id="result-ui" class="result-screen">
        <h1 style="color: var(--gold);">推理結束！</h1>
        <div class="score-display"><span id="final-score">0</span>分</div>
        <p class="comment" id="comment-text"></p>
        <button class="btn" style="background: var(--red); width: 100%; text-align: center;" onclick="location.reload()">重新挑戰</button>
    </div>
</div>

<script>
    /* ========================================================================
       【學生修改區】
       如果要換成自己的題目，只要修改下面這個 questions 陣列即可。
       q: 題目
       o: 選項 (雖然這裡有順序，但程式執行時會隨機打亂)
       a: 正確答案在 o 陣列中的索引 (0 是第一個，1 是第二個)
       r: 錯誤時的解釋 (Reason)
       ========================================================================
    */
    const questions = [
        // 前 10 題：簡單
        { q: "當你看到這張迷因，你覺得它是？", o: ["經典", "過氣"], a: 0, r: "經典之所以為經典，就是因為永不過時！" },
        { q: "迷因通常是為了？", o: ["讓人發笑或共鳴", "寫學術論文"], a: 0, r: "迷因的主要靈魂在於幽默感與社交共鳴。" },
        { q: "「我就爛」這張迷因通常代表什麼心態？", o: ["自暴自棄的坦承", "努力奮發向上"], a: 0, r: "「我就爛」是一種誠實面對自己軟爛狀態的幽默感。" },
        { q: "在網路用語中，「草」代表什麼意思？", o: ["笑（w的形狀）", "環保環保"], a: 0, r: "日文「笑」的首字母 w 像草，所以日本網民用草表示笑。" },
        { q: "迷因圖一定要很高畫質嗎？", o: ["不用，糊圖更有感覺", "一定要 4K 解析度"], a: 0, r: "有時候模糊的「底片感」或「馬賽克感」反而增加迷因味。" },
        { q: "如果一個梗被過度重複使用到無趣，這叫？", o: ["爛梗", "神梗"], a: 0, r: "任何有趣的梗，重複過度後都會變得很尷尬。" },
        { q: "在網路上，「給他一個讚」這行為叫？", o: ["按讚", "按讚（但沒人問你）"], a: 0, r: "點個讚是基本的網路社交禮儀喔！" },
        { q: "「黑人問號」的主角是哪位球星？", o: ["Nick Young", "LeBron James"], a: 0, r: "那是 Nick Young 當時在紀錄片中的表情。" },
        { q: "Rickroll 是指什麼？", o: ["用特定歌曲釣魚", "滾動的石頭"], a: 0, r: "這是網路最經典的釣魚手法：Rick Astley 的歌。" },
        { q: "當看到正妹/帥哥說「我想去洗澡」，通常代表？", o: ["想結束話題", "他真的很愛乾淨"], a: 0, r: "「洗澡」通常是網路上的客氣句點法。" },
        
        // 中間題型 (省略 52 題，保持範例長度，請依照格式補足至 67 題)
        // 此處僅為示意，您可以自行複製貼上並修改文字
        ...Array.from({length: 52}, (_, i) => ({
            q: `這是第 ${i + 11} 個案件：關於迷因的演化...`,
            o: ["正確選項", "錯誤選項"],
            a: 0,
            r: "這是一個標準的迷因推理過程。"
        })),

        // 最後 5 題：進階難度
        { q: "關於迷因（Meme）一詞，最早是由誰在《自私的基因》中提出？", o: ["道金斯 (Dawkins)", "達爾文 (Darwin)"], a: 0, r: "理察·道金斯於1976年提出了 Meme 的概念。" },
        { q: "迷因的傳播特性最接近哪種模式？", o: ["病毒式複製與變異", "教科書式精準傳遞"], a: 0, r: "迷因會隨時間不斷演化、被改編，具有高度變異性。" },
        { q: "「Doge」這隻柴犬的真實名字是？", o: ["Kabosu", "Shiba"], a: 0, r: "這隻受歡迎的柴犬名叫 Kabosu，是一隻日本救援犬。" },
        { q: "當一個梗從次文化圈進入主流媒體，通常意味著？", o: ["迷因壽命將盡", "迷因正在覺醒"], a: 0, r: "通常當主流媒體開始使用時，核心玩家就會覺得這梗變尷尬了。" },
        { q: "「女人吼貓」這張迷因中，貓的名字是？", o: ["Smudge", "Garfield"], a: 0, r: "那是 Smudge the Cat，一隻不愛吃蔬菜的白貓。" }
    ];

    let currentIdx = 0;
    let score = 0;
    let canAnswer = true;

    // 初始化測驗
    function initQuiz() {
        if (currentIdx >= questions.length) {
            showResult();
            return;
        }

        canAnswer = true;
        const qData = questions[currentIdx];
        document.getElementById("current-idx").innerText = currentIdx + 1;
        document.getElementById("question").innerText = qData.q;
        document.getElementById("feedback").style.display = "none";
        document.getElementById("next-btn").style.display = "none";

        // 處理選項：打亂順序
        const optionsContainer = document.getElementById("options");
        optionsContainer.innerHTML = "";
        
        // 建立帶有原始索引的選項物件
        let optionItems = qData.o.map((text, index) => ({ text, isCorrect: index === qData.a }));
        // 隨機打亂
        optionItems.sort(() => Math.random() - 0.5);

        optionItems.forEach(item => {
            const btn = document.createElement("button");
            btn.className = "btn";
            btn.innerText = item.text;
            btn.onclick = () => checkAnswer(btn, item.isCorrect);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedBtn, isCorrect) {
        if (!canAnswer) return;
        canAnswer = false;

        const allBtns = document.querySelectorAll("#options .btn");
        const feedback = document.getElementById("feedback");
        const qData = questions[currentIdx];

        if (isCorrect) {
            score += 10;
            selectedBtn.classList.add("correct");
            feedback.innerHTML = `<b style="color:var(--gold)">推理成功！</b> 關鍵線索找到了。`;
            document.getElementById("score").innerText = score;
        } else {
            selectedBtn.classList.add("wrong");
            // 找出正確的那個按鈕標記出來
            allBtns.forEach(btn => {
                // 這裡簡單判定：如果內容等於正確答案文字，就標綠
                if(btn.innerText === qData.o[qData.a]) btn.classList.add("correct");
            });
            feedback.innerHTML = `<b style="color:var(--red)">推理失誤！</b><br>正確答案是：${qData.o[qData.a]}<br>解析：${qData.r}`;
        }

        feedback.style.display = "block";
        feedback.style.background = isCorrect ? "rgba(42, 157, 143, 0.2)" : "rgba(230, 57, 70, 0.2)";
        document.getElementById("next-btn").style.display = "block";
        
        // 禁用所有按鈕
        allBtns.forEach(btn => btn.disabled = true);
    }

    function nextQuestion() {
        currentIdx++;
        initQuiz();
    }

    function showResult() {
        document.getElementById("quiz-ui").style.display = "none";
        const resultUi = document.getElementById("result-ui");
        resultUi.style.display = "block";
        
        document.getElementById("final-score").innerText = score;
        const comment = document.getElementById("comment-text");

        if (score >= 130) {
            comment.innerText = "完美破案！你已經掌握大部分觀念。";
        } else if (score >= 90) {
            comment.innerText = "表現不錯！再複習幾個觀念，就能更穩。";
        } else {
            comment.innerText = "線索還有點混亂，重新挑戰一次，下一輪就能抓到關鍵重點。";
        }
    }

    // 啟動
    window.onload = initQuiz;
</script>

</body>
</html>
