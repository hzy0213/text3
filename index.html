<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【請在這裡輸入你的測驗標題】迷因2選1</title>
    <style>
        :root {
            --dark-blue: #0A192F;
            --bright-blue: #172A45;
            --accent-blue: #30D5C8;
            --red: #E63946;
            --gold: #FFD700;
            --white: #F8F9FA;
        }

        body {
            background-color: var(--dark-blue);
            color: var(--white);
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            width: 100%;
            max-width: 650px;
            background: var(--bright-blue);
            border: 3px solid var(--gold);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            position: relative;
        }

        #game-container::before {
            content: "DETECTIVE CASE FILE";
            position: absolute;
            top: -15px;
            left: 20px;
            background: var(--red);
            color: white;
            padding: 4px 15px;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 2px;
            transform: skewX(-15deg);
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--gold);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        h1 { margin: 10px 0; color: var(--gold); font-size: 1.8rem; text-shadow: 2px 2px #000; }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--accent-blue);
            font-weight: bold;
        }

        /* 案件卡片風格 */
        .case-card {
            background: var(--white);
            color: #333;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 10px solid var(--red);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .meme-img-container {
            width: 100%;
            margin-bottom: 15px;
            text-align: center;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        .meme-img {
            max-width: 100%;
            max-height: 300px;
            object-fit: contain;
            display: block;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: bold;
            line-height: 1.5;
            color: #1a1a1a;
        }

        .options-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 20px 10px;
            font-size: 1.2rem;
            cursor: pointer;
            border: 2px solid var(--gold);
            background: rgba(255, 255, 255, 0.05);
            color: var(--white);
            border-radius: 8px;
            transition: all 0.2s;
            font-weight: bold;
        }

        .btn:hover:not(:disabled) {
            background: var(--gold);
            color: var(--dark-blue);
            transform: translateY(-3px);
        }

        .btn:disabled { cursor: not-allowed; }

        .correct { background-color: #2a9d8f !important; border-color: #fff !important; color: white; }
        .wrong { background-color: var(--red) !important; border-color: #fff !important; color: white; }

        #feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            border: 1px dashed var(--gold);
            background: rgba(0,0,0,0.3);
        }

        .next-btn {
            display: none;
            width: 100%;
            margin-top: 20px;
            background: var(--gold);
            color: var(--dark-blue);
            font-weight: 900;
            text-align: center;
            border: none;
            padding: 15px;
            font-size: 1.3rem;
            text-transform: uppercase;
        }

        .result-screen { text-align: center; display: none; }
        .score-display { font-size: 4rem; color: var(--gold); margin: 10px 0; text-shadow: 3px 3px var(--red); }

        @media (max-width: 500px) {
            .options-container { grid-template-columns: 1fr; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="quiz-ui">
        <header>
            <h1 id="title-text">偵探迷因：真相只有一個</h1>
        </header>
        
        <div class="status-bar">
            <span>案件: <span id="current-idx">1</span> / 67</span>
            <span>得分: <span id="score">0</span></span>
        </div>

        <div class="case-card">
            <div class="meme-img-container">
                <img id="question-img" src="" alt="線索圖片" class="meme-img">
            </div>
            <div class="question-text" id="question">正在搜查線索...</div>
        </div>

        <div class="options-container" id="options"></div>

        <div id="feedback"></div>

        <button class="btn next-btn" id="next-btn" onclick="nextQuestion()">前往下一個現場 >></button>
    </div>

    <div id="result-ui" class="result-screen">
        <h1 style="color: var(--gold);">偵查終結</h1>
        <div class="score-display"><span id="final-score">0</span>分</div>
        <p class="comment" id="comment-text" style="font-size: 1.3rem;"></p>
        <button class="btn" style="background: var(--red); width: 100%;" onclick="location.reload()">重新偵辦</button>
    </div>
</div>

<script>
    /* 【學生修改說明】
       1. q: 題目
       2. img: 圖片網址 (可以是網路連結，或跟 html 同資料夾的檔名)
       3. o: 選項 [選項1, 選項2]
       4. a: 正確答案索引 (0 或 1)
       5. r: 解析文字
    */
    const questions = [
        // 前 10 題 (基礎)
        { q: "看到這張經典圖，你知道這隻柴犬的名字嗎？", img: "https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?auto=format&fit=crop&w=600&q=80", o: ["Kabosu", "Doge"], a: 0, r: "雖然大家都叫牠 Doge，但牠的真實名字叫 Kabosu。" },
        { q: "這是什麼迷因的起源？", img: "https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=600&q=80", o: ["女人吼貓", "驚訝貓"], a: 0, r: "這是迷因界最有名的白貓 Smudge。" },
        { q: "這張圖通常用來表達什麼？", img: "https://images.unsplash.com/photo-1531259683007-016a7b628fc3?auto=format&fit=crop&w=600&q=80", o: ["正義感", "其實我是蝙蝠俠"], a: 1, r: "這是一個身分被識破或隱藏身分的梗。" },
        { q: "圖中的手勢在網路文化中代表？", img: "https://images.unsplash.com/photo-1516733968668-dbdce39c46ef?auto=format&fit=crop&w=600&q=80", o: ["思考中", "頭痛"], a: 0, r: "這叫 Roll Safe，代表「如果你不帶大腦，就不會遇到問題」。" },
        { q: "這張迷因通常與哪個單字連用？", img: "https://images.unsplash.com/photo-1599508704512-2f19efd1e35f?auto=format&fit=crop&w=600&q=80", o: ["Stonks", "Money"], a: 0, r: "Stonks 是 Stocks 的刻意拼錯版，用來嘲諷滑稽的金融決策。" },
        // ... 此處簡化示範，重複產生題目直到 67 題 ...
        ...Array.from({length: 57}, (_, i) => ({
            q: `第 ${i + 6} 號案件：這是一個關於迷因的測試`,
            img: `https://picsum.photos/seed/${i+100}/600/300`, // 使用隨機圖片佔位
            o: ["正確選擇", "錯誤選擇"],
            a: 0,
            r: "身為偵探，細心觀察是成功的唯一途徑。"
        })),
        // 最後 5 題 (進階)
        { q: "Rickroll 這首歌的發行年份是？", img: "https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&w=600&q=80", o: ["1987", "1997"], a: 0, r: "Rick Astley 在 1987 年發行了 Never Gonna Give You Up。" }
    ];

    let currentIdx = 0;
    let score = 0;
    let canAnswer = true;

    function initQuiz() {
        if (currentIdx >= questions.length) {
            showResult();
            return;
        }

        canAnswer = true;
        const qData = questions[currentIdx];
        document.getElementById("current-idx").innerText = currentIdx + 1;
        document.getElementById("question").innerText = qData.q;
        document.getElementById("question-img").src = qData.img;
        document.getElementById("feedback").style.display = "none";
        document.getElementById("next-btn").style.display = "none";

        const optionsContainer = document.getElementById("options");
        optionsContainer.innerHTML = "";
        
        let optionItems = qData.o.map((text, index) => ({ text, isCorrect: index === qData.a }));
        optionItems.sort(() => Math.random() - 0.5);

        optionItems.forEach(item => {
            const btn = document.createElement("button");
            btn.className = "btn";
            btn.innerText = item.text;
            btn.onclick = () => checkAnswer(btn, item.isCorrect);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedBtn, isCorrect) {
        if (!canAnswer) return;
        canAnswer = false;

        const allBtns = document.querySelectorAll("#options .btn");
        const feedback = document.getElementById("feedback");
        const qData = questions[currentIdx];

        if (isCorrect) {
            score += 10;
            selectedBtn.classList.add("correct");
            feedback.innerHTML = `<span style="color:var(--gold); font-size:1.2rem;">★ 推理成功！</span><br>犯人（答案）果然就是你！`;
        } else {
            selectedBtn.classList.add("wrong");
            allBtns.forEach(btn => {
                if(btn.innerText === qData.o[qData.a]) btn.classList.add("correct");
            });
            feedback.innerHTML = `<span style="color:var(--red); font-size:1.2rem;">✘ 推理失誤！</span><br>正確線索是：<b>${qData.o[qData.a]}</b><br><small>${qData.r}</small>`;
        }

        document.getElementById("score").innerText = score;
        feedback.style.display = "block";
        document.getElementById("next-btn").style.display = "block";
        allBtns.forEach(btn => btn.disabled = true);
    }

    function nextQuestion() {
        currentIdx++;
        initQuiz();
    }

    function showResult() {
        document.getElementById("quiz-ui").style.display = "none";
        document.getElementById("result-ui").style.display = "block";
        document.getElementById("final-score").innerText = score;
        
        const comment = document.getElementById("comment-text");
        if (score >= 130) {
            comment.innerText = "完美破案！你已經掌握大部分觀念。";
        } else if (score >= 90) {
            comment.innerText = "表現不錯！再複習幾個觀念，就能更穩。";
        } else {
            comment.innerText = "線索還有點混亂，重新挑戰一次吧！";
        }
    }

    window.onload = initQuiz;
</script>

</body>
</html>
